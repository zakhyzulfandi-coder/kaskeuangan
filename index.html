<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />

  <meta name="theme-color" content="#2563eb" />
  <meta
    name="description"
    content="My Kas - aplikasi pengelolaan kas mahasiswa."
  />

  <title>My Kas</title>

  <link rel="manifest" href="./manifest.json?v=1" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png?v=1" />
  <link rel="apple-touch-icon" href="./icon-192.png?v=1" />

  <style>
    :root {
      --blue: #2563eb;
      --blue-dark: #1d4ed8;
      --pink: #ec4899;
      --dark: #0f172a;
      --muted: #64748b;
      --line: #dbe4f0;
      --bg: #f6f8fc;
      --white: #ffffff;
      --danger: #991b1b;
      --danger-line: #fecaca;
    }

    * {
      box-sizing: border-box;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, .14), transparent 35%),
        radial-gradient(circle at bottom right, rgba(236, 72, 153, .14), transparent 35%),
        var(--bg);
      color: var(--dark);
      overflow: hidden;
      touch-action: manipulation;
    }

    .app-shell {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      min-height: 68px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: rgba(255, 255, 255, .86);
      border-bottom: 1px solid rgba(219, 228, 240, .95);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 10px 35px rgba(15, 23, 42, .08);
      z-index: 10;
    }

    .brand {
      min-width: 0;
      display: flex;
      align-items: center;
    }

    .brand-title {
      margin: 0;
      font-size: 18px;
      font-weight: 950;
      line-height: 1.1;
      letter-spacing: -.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brand-subtitle {
      display: block;
      margin-top: 4px;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .btn {
      height: 42px;
      border: none;
      border-radius: 14px;
      padding: 0 14px;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, var(--blue), var(--pink));
      box-shadow: 0 12px 26px rgba(37, 99, 235, .20);
      transition: .2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 30px rgba(37, 99, 235, .24);
    }

    .btn:active {
      transform: translateY(0);
      box-shadow: 0 8px 18px rgba(37, 99, 235, .20);
    }

    .btn:disabled {
      opacity: .75;
      cursor: not-allowed;
      transform: none;
    }

    .btn.secondary {
      color: var(--dark);
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: none;
    }

    #updateBtn {
      background: linear-gradient(135deg, #16a34a, #22c55e);
      box-shadow: 0 12px 26px rgba(34, 197, 94, .22);
    }

    .frame-wrap {
      position: relative;
      min-height: 0;
      height: 100%;
      background: #fff;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }

    .loading {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, .10), transparent 35%),
        radial-gradient(circle at bottom right, rgba(236, 72, 153, .10), transparent 35%),
        #f8fafc;
      transition: opacity .25s ease, visibility .25s ease;
      z-index: 5;
    }

    .loading.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-card {
      width: min(320px, calc(100% - 32px));
      padding: 24px;
      border-radius: 26px;
      background: rgba(255, 255, 255, .94);
      border: 1px solid var(--line);
      box-shadow: 0 24px 70px rgba(15, 23, 42, .15);
      text-align: center;
    }

    .spinner {
      width: 48px;
      height: 48px;
      margin: 0 auto 14px;
      border-radius: 50%;
      border: 4px solid #dbeafe;
      border-top-color: var(--pink);
      animation: spin .8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loader-card strong {
      display: block;
      font-size: 16px;
      margin-bottom: 5px;
    }

    .loader-card span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .offline {
      position: fixed;
      left: 14px;
      right: 14px;
      bottom: 14px;
      z-index: 20;
      display: none;
      padding: 12px 14px;
      border-radius: 18px;
      background: #fff;
      border: 1px solid var(--danger-line);
      color: var(--danger);
      box-shadow: 0 18px 45px rgba(15, 23, 42, .16);
      font-size: 13px;
      font-weight: 800;
      text-align: center;
    }

    .offline.show {
      display: block;
    }

    @media (max-width: 640px) {
      .topbar {
        min-height: 58px;
        padding: 8px 10px;
      }

      .brand-title {
        font-size: 15px;
      }

      .brand-subtitle {
        font-size: 10px;
        margin-top: 2px;
      }

      .btn {
        height: 38px;
        padding: 0 10px;
        font-size: 12px;
        border-radius: 13px;
      }

      .btn.secondary {
        display: none;
      }

      .loader-card {
        width: min(300px, calc(100% - 34px));
        padding: 22px;
        border-radius: 24px;
      }

      .spinner {
        width: 42px;
        height: 42px;
      }
    }

    @media (max-width: 380px) {
      .topbar {
        min-height: 54px;
      }

      .brand-title {
        font-size: 14px;
      }

      .brand-subtitle {
        display: none;
      }

      .btn {
        height: 36px;
        padding: 0 9px;
        font-size: 11px;
      }
    }
  </style>
</head>

<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div>
          <h1 class="brand-title">My Kas</h1>
          <span class="brand-subtitle">Aplikasi kas kelas berbasis digital</span>
        </div>
      </div>

      <div class="actions">
        <button class="btn secondary" type="button" onclick="reloadApp()">Refresh</button>
        <button class="btn" id="updateBtn" type="button" style="display:none;">Update Aplikasi</button>
        <button class="btn" id="installBtn" type="button" style="display:none;">Install</button>
      </div>
    </header>

    <section class="frame-wrap">
      <iframe
        id="appFrame"
        title="My Kas"
        src="https://script.google.com/a/~/macros/s/AKfycbwpXHEvp0q0Pg0anChYV-OOjuHQUR7uov1n9wSbg92ZnfopaJLW59wo0ncdm5qeLpdU/exec"
        allow="fullscreen"
      ></iframe>

      <div class="loading" id="loading">
        <div class="loader-card">
          <div class="spinner"></div>
          <strong>Membuka Aplikasi</strong>
          <span>Jika halaman tidak tampil, pastikan koneksi Anda terhubung ke server.</span>
        </div>
      </div>
    </section>
  </main>

  <div class="offline" id="offlineBanner">
    Koneksi internet terputus. Aplikasi kas membutuhkan internet untuk membuka data Spreadsheet.
  </div>

  <script>
    const APP_SCRIPT_URL = "https://script.google.com/a/~/macros/s/AKfycbwpXHEvp0q0Pg0anChYV-OOjuHQUR7uov1n9wSbg92ZnfopaJLW59wo0ncdm5qeLpdU/exec";

    const frame = document.getElementById("appFrame");
    const loading = document.getElementById("loading");
    const offlineBanner = document.getElementById("offlineBanner");
    const installBtn = document.getElementById("installBtn");
    const updateBtn = document.getElementById("updateBtn");

    let deferredPrompt = null;
    let newWorkerWaiting = null;
    let refreshing = false;

    frame.addEventListener("load", () => {
      setTimeout(() => {
        loading.classList.add("hide");
      }, 700);
    });

    function reloadApp() {
      loading.classList.remove("hide");

      frame.src =
        APP_SCRIPT_URL +
        (APP_SCRIPT_URL.includes("?") ? "&" : "?") +
        "t=" +
        Date.now();
    }

    function updateOnlineStatus() {
      offlineBanner.classList.toggle("show", !navigator.onLine);
    }

    window.addEventListener("online", updateOnlineStatus);
    window.addEventListener("offline", updateOnlineStatus);
    updateOnlineStatus();

    window.addEventListener("beforeinstallprompt", (event) => {
      event.preventDefault();
      deferredPrompt = event;
      installBtn.style.display = "inline-flex";
    });

    installBtn.addEventListener("click", async () => {
      if (!deferredPrompt) {
        alert("Browser belum menyiapkan tombol install. Coba gunakan menu Install di browser.");
        return;
      }

      deferredPrompt.prompt();
      await deferredPrompt.userChoice;

      deferredPrompt = null;
      installBtn.style.display = "none";
    });

    window.addEventListener("appinstalled", () => {
      deferredPrompt = null;
      installBtn.style.display = "none";
    });

    function showUpdateButton() {
      if (!updateBtn) return;
      updateBtn.style.display = "inline-flex";
    }

    if (updateBtn) {
      updateBtn.addEventListener("click", () => {
        if (!newWorkerWaiting) return;

        updateBtn.innerText = "Memperbarui...";
        updateBtn.disabled = true;

        newWorkerWaiting.postMessage({ type: "SKIP_WAITING" });
      });
    }

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", async () => {
        try {
          const registration = await navigator.serviceWorker.register("./sw.js");

          registration.update();

          if (registration.waiting) {
            newWorkerWaiting = registration.waiting;
            showUpdateButton();
          }

          registration.addEventListener("updatefound", () => {
            const newWorker = registration.installing;

            if (!newWorker) return;

            newWorker.addEventListener("statechange", () => {
              if (
                newWorker.state === "installed" &&
                navigator.serviceWorker.controller
              ) {
                newWorkerWaiting = newWorker;
                showUpdateButton();
              }
            });
          });

          navigator.serviceWorker.addEventListener("controllerchange", () => {
            if (refreshing) return;

            refreshing = true;
            window.location.reload();
          });

        } catch (error) {
          console.log("Service Worker gagal:", error);
        }
      });
    }

    document.addEventListener(
      "wheel",
      function (event) {
        if (event.ctrlKey) {
          event.preventDefault();
        }
      },
      { passive: false }
    );

    document.addEventListener("keydown", function (event) {
      if (
        event.ctrlKey &&
        (
          event.key === "+" ||
          event.key === "-" ||
          event.key === "=" ||
          event.key === "0"
        )
      ) {
        event.preventDefault();
      }
    });

    document.addEventListener("gesturestart", function (event) {
      event.preventDefault();
    });

    let lastTouchEnd = 0;
    document.addEventListener(
      "touchend",
      function (event) {
        const now = new Date().getTime();

        if (now - lastTouchEnd <= 300) {
          event.preventDefault();
        }

        lastTouchEnd = now;
      },
      false
    );
  </script>
</body>
</html>
